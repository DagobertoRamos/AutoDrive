<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <style>
    :root { --brand: #1e40af; --ink: #1f2937; --muted: #6b7280; --line: #e5e7eb; }
    * { box-sizing: border-box; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { width: 360px; margin: 0; padding: 14px; color: var(--ink); }
    h1 { font-size: 14px; margin: 0 0 2px; }
    p.sub { font-size: 11px; color: var(--muted); margin: 0 0 12px; }
    button { border: 0; border-radius: 8px; padding: 9px 12px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .primary { background: var(--brand); color: #fff; width: 100%; }
    .primary:disabled { opacity: .5; cursor: default; }
    .ghost { background: #f3f4f6; color: var(--ink); }
    .row { display: flex; gap: 8px; margin-top: 8px; }
    #log { margin-top: 12px; font-size: 11px; color: var(--muted); max-height: 120px; overflow-y: auto; border-top: 1px solid var(--line); padding-top: 8px; white-space: pre-wrap; }
    #stats { margin-top: 10px; display: none; }
    .card { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font-size: 12px; }
    .big { font-size: 22px; font-weight: 700; color: var(--brand); }
    .kv { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 2px; }
    .warn { color: #b45309; }
  </style>
</head>
<body>
  <h1>AutoConf → AutoDrive</h1>
  <p class="sub">Lê as negociações do <b>mês atual</b> (Finalizada / Pendente Contrato / Pendente NFe) e o vendedor de cada uma, e importa no AutoDrive.</p>

  <div style="margin-bottom:10px">
    <label style="font-size:11px;color:var(--muted)">Token do AutoDrive</label>
    <div class="row" style="margin-top:4px">
      <input id="token" type="password" placeholder="acd_..." style="flex:1;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px" />
      <button id="saveToken" class="ghost">Salvar</button>
    </div>
  </div>

  <button id="scan" class="primary">1) Ler negociações do mês</button>

  <div id="stats">
    <div class="card">
      <div class="big" id="count">0</div>
      <div>negociações do mês <span id="month"></span></div>
      <div class="kv"><span>Por tipo</span><span id="byTipo">—</span></div>
      <div class="kv"><span>Por status</span><span id="byStatus">—</span></div>
      <div class="kv warn" id="semVendedorLine" style="display:none"><span>Sem vendedor detectado</span><span id="semVendedor">0</span></div>
    </div>
    <div class="row">
      <button id="download" class="ghost" style="flex:1">Baixar JSON</button>
      <button id="sample" class="ghost" style="flex:1">Ver 1 exemplo</button>
    </div>
    <div class="row" style="margin-top:8px">
      <button id="preview" class="ghost" style="flex:1">2) Prévia no AutoDrive</button>
      <button id="import" class="primary" style="flex:1">3) Importar</button>
    </div>
  </div>

  <div id="log">Abra o AutoConf em uma aba, logado, e clique acima.</div>

  <script src="popup.js"></script>
</body>
</html>
