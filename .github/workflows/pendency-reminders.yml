# =============================================================================
# Lembretes de pendência + arquivamento automático — pinger horário.
# O Vercel Hobby limita cron a 2 jobs (já usados), então usamos o GitHub Actions
# (grátis) para disparar os lembretes de pendência e o arquivamento automático
# de resolvidas de hora em hora. A rota é
# protegida por CRON_SECRET; a JANELA de horário/dias (BRT) é respeitada DENTRO
# do dispatcher, então pode disparar 24/7 sem incomodar fora do expediente.
#
# CONFIGURAR (1 passo): no GitHub → Settings → Secrets and variables → Actions →
#   New repository secret → Name: CRON_SECRET  | Value: o MESMO valor que está
#   na Vercel (Settings → Environment Variables → CRON_SECRET).
# =============================================================================

name: Pendências: lembretes e arquivo automático

on:
  schedule:
    - cron: '0 * * * *' # toda hora cheia (UTC)
  workflow_dispatch: {} # permite disparar manualmente pela aba Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar automações de pendência
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Falha cedo (e claro) se o segredo do GitHub não estiver configurado.
          if [ -z "$CRON_SECRET" ]; then
            echo "ERRO: o secret CRON_SECRET NÃO está definido neste repositório (GitHub → Settings → Secrets and variables → Actions)."
            exit 1
          fi
          code=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
            "https://auto-drive-mocha.vercel.app/api/internal/pendencies/reminders/run" \
            -H "x-cron-secret: $CRON_SECRET")
          echo "HTTP $code"
          cat /tmp/out.json || true
          if [ "$code" = "401" ]; then
            echo ""
            echo ">> Diagnóstico (não revela o segredo, só tamanhos):"
            curl -sS -X POST \
              "https://auto-drive-mocha.vercel.app/api/internal/pendencies/reminders/run?diag=1" \
              -H "x-cron-secret: $CRON_SECRET" | tr ',' '\n'
            echo ""
            echo ">> Leitura: envSet=false → CRON_SECRET NÃO está em Production na Vercel (ou faltou redeploy)."
            echo "            envLen≠gotLen → tem espaço/quebra sobrando em algum dos lados."
            echo "            envLen=gotLen mas match=false → valores diferentes."
          fi
          test "$code" = "200"
