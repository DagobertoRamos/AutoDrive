name: Deploy to Vercel

# Publica a produção a cada push na main via CLI oficial da Vercel.
#
# HISTÓRICO: até 2026-07-14 este workflow usava `vercel/action@v2` — uma action
# que NÃO EXISTE ("repository not found") — e referenciava secrets inexistentes.
# Resultado: TODOS os deploys falhavam em ~5s e a produção ficou congelada num
# deploy manual antigo por semanas. Reescrito para a CLI oficial.
#
# ÚNICO secret necessário (Settings → Secrets and variables → Actions → New):
#   VERCEL_TOKEN — gere em https://vercel.com/account/tokens
# Os IDs abaixo não são sigilosos (são identificadores do projeto linkado).

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_Ix3mqL5QyvFDksqexZwStQyi
      VERCEL_PROJECT_ID: prj_8ABfXUDjIsi7ATD9i9drnIqe48wH
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifacts to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
